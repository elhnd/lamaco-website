        title: About LAMACO
        description: "Building the future of Senegal through reliable construction logistics, premium materials, and unwavering commitment to excellence."

    story:
        alt_image: "LAMACO Headquarters in Dakar, Senegal"
        badge: Established
        badge_year: "2009"
        title: "Founded on Reliability, Grown through Excellence"
        paragraph1: "LAMACO began its journey in Dakar with a clear vision: to bridge the gap in Senegal's construction supply chain. Starting with a single logistics unit, we have grown into a multi-faceted industry leader providing essential materials and heavy equipment to the nation's most critical infrastructure projects."
        paragraph2: "Our story is one of consistent commitment to our partners. We understand that in construction, time and material quality are the foundations of success. By investing in a modern fleet and securing the best basalt and sand sources, LAMACO has become the trusted backbone for international developers and local contractors alike."
        quote: "\"Our mission is to build the future of Senegal by ensuring no site ever stops moving due to logistics or supply.\""

    mission:
        title: Our Mission
        description: "To provide world-class construction materials and logistical solutions that empower developers to complete projects safely, on time, and within budget. We strive to be the most reliable link in the Senegalese construction supply chain."

    vision:
        title: Our Vision
        description: "To become the undisputed leader in construction logistics in West Africa, recognized for our innovation, operational excellence, and our contribution to building a modern, sustainable infrastructure for the next generation."

    values:
