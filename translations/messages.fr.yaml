# ── Page À Propos ──
about:
    meta:
        title: "À Propos de LAMACO | Expertise Construction & Logistique au Sénégal"
        description: "Découvrez la mission, la vision, les valeurs et la direction de LAMACO. Un partenaire sénégalais de confiance dans la construction depuis 2009."
        og_title: "À Propos de LAMACO | Expertise Construction & Logistique"
        og_description: "Découvrez notre parcours, nos valeurs fondamentales et l'équipe derrière l'entreprise de logistique de construction la plus fiable du Sénégal."

    hero:
        subtitle: Notre Parcours
        title: À Propos de LAMACO
        description: "Bâtir l'avenir du Sénégal grâce à une logistique de construction fiable, des matériaux premium et un engagement sans faille envers l'excellence."

    story:
        alt_image: "Siège de LAMACO à Dakar, Sénégal"
        badge: Fondée en
        badge_year: "2009"
        title: "Fondée sur la Fiabilité, Grandie par l'Excellence"
        paragraph1: "LAMACO a commencé son parcours à Dakar avec une vision claire : combler le fossé de la chaîne d'approvisionnement de la construction au Sénégal. En partant d'une seule unité logistique, nous avons grandi pour devenir un leader multifacette de l'industrie, fournissant des matériaux essentiels et des engins lourds aux projets d'infrastructure les plus critiques du pays."
        paragraph2: "Notre histoire est celle d'un engagement constant envers nos partenaires. Nous comprenons que dans la construction, le temps et la qualité des matériaux sont les fondations du succès. En investissant dans une flotte moderne et en sécurisant les meilleures sources de basalte et de sable, LAMACO est devenu le pilier de confiance des promoteurs internationaux et des entrepreneurs locaux."
        quote: "\"Notre mission est de bâtir l'avenir du Sénégal en veillant à ce qu'aucun chantier ne s'arrête jamais à cause de la logistique ou de l'approvisionnement.\""

    mission:
        title: Notre Mission
        description: "Fournir des matériaux de construction et des solutions logistiques de classe mondiale qui permettent aux promoteurs de réaliser leurs projets en toute sécurité, dans les délais et dans les limites du budget. Nous nous efforçons d'être le maillon le plus fiable de la chaîne d'approvisionnement de la construction sénégalaise."

    vision:
        title: Notre Vision
        description: "Devenir le leader incontesté de la logistique de construction en Afrique de l'Ouest, reconnu pour notre innovation, notre excellence opérationnelle et notre contribution à la construction d'une infrastructure moderne et durable pour la prochaine génération."

    values:
        subtitle: Principes Fondamentaux
        title: Les Valeurs qui Nous Animent
        reliability: Fiabilité
        reliability_desc: "Nous livrons ce que nous promettons, quand nous le promettons. La constance est la marque de notre service."
        innovation: Innovation
        innovation_desc: "Nous optimisons la logistique grâce à la technologie et à la gestion moderne de flotte pour une efficacité maximale."
        professionalism: Professionnalisme
        professionalism_desc: "Notre équipe incarne les plus hauts standards d'intégrité et d'expertise dans chaque interaction."
        safety: Sécurité
        safety_desc: "Approche zéro compromis en matière de sécurité sur site et de bien-être de nos opérateurs et partenaires."

    leadership:
        subtitle: Direction
        title: Notre Équipe Dirigeante
        managing_director: Directeur Général
        head_operations: Directrice des Opérations
        logistics_director: Directeur Logistique

    partners:
        title: Partenaires Stratégiques
        subtitle: "La Confiance des Principaux Promoteurs & Entrepreneurs"
        alt_logo: Logo de Partenaire Stratégique

